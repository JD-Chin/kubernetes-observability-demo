name: Validate Repository Structure

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate kubernetes-manifests.yaml exists
        run: |
          echo "Checking for kubernetes-manifests.yaml..."
          test -f kubernetes-manifests.yaml && echo "✓ kubernetes-manifests.yaml found" || exit 1

      - name: Validate screenshots folder exists
        run: |
          echo "Checking for screenshots directory..."
          test -d screenshots && echo "✓ screenshots directory found" || exit 1

      - name: Validate docs folder exists
        run: |
          echo "Checking for docs directory..."
          test -d docs && echo "✓ docs directory found" || exit 1

      - name: Validate README exists
        run: |
          echo "Checking for README.md..."
          test -f README.md && echo "✓ README.md found" || exit 1

      - name: Validate architecture decisions doc exists
        run: |
          echo "Checking for architecture decisions document..."
          test -f docs/architecture-decisions.md && echo "✓ architecture-decisions.md found" || exit 1
